name: Build and Push Docker Image (Models and Voices)
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Image (Models and Voices)
    runs-on: self-hosted
    steps:
      # Only remove dangling (untagged) images so that Docker and BuildKit
      # keep their layer caches intact between runs.
      - name: Clean up Docker Resources
        run: |
          docker image prune -f || true
          docker images ${{ secrets.REGISTRY }}/${{ secrets.NAMESPACE }}/kingsraid \
            --format "{{.ID}} {{.CreatedAt}}" \
            | sort -k2 -r \
            | tail -n +2 \
            | awk '{print $1}' \
            | xargs -r docker rmi -f || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Fetch the current HEAD commit hash of each assets repo.
      # This value is passed to data-stage as ASSETS_CACHE_VERSION so that
      # BuildKit's layer cache is automatically busted when either repo
      # changes, without any manual intervention.
      - name: Resolve assets cache version
        id: assets-version
        run: |
          MODELS_HASH=$(git ls-remote https://gitea.k-clowd.top/faberuser/kingsraid-models.git HEAD \
            2>/dev/null | cut -f1 | cut -c1-8 || echo "unknown") &
          PID1=$!
          AUDIO_HASH=$(git ls-remote https://gitea.k-clowd.top/faberuser/kingsraid-audio.git HEAD \
            2>/dev/null | cut -f1 | cut -c1-8 || echo "unknown") &
          PID2=$!
          wait $PID1 $PID2
          VERSION="${MODELS_HASH}-${AUDIO_HASH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest
          buildkitd-flags: --allow-insecure-entitlement security.insecure
          buildkitd-config-inline: |
            [registry."${{ secrets.REGISTRY }}"]
              http = true
              insecure = true

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY }}/${{ secrets.NAMESPACE }}/kingsraid:latest
          build-args: |
            NEXT_PUBLIC_ENABLE_MODELS_VOICES=true
            ASSETS_CACHE_VERSION=${{ steps.assets-version.outputs.version }}
          cache-from: type=local,src=/var/tmp/.buildx-cache
          cache-to: type=local,dest=/var/tmp/.buildx-cache-new,mode=max,oci-mediatypes=true,compression=zstd,compression-level=3
          # Remove unnecessary
          load: false
          provenance: false
          sbom: false
          # Reuse existing builder instead of recreating each run
          append: false
          use: true
          install: false
          endpoint: kingsraid-builder

      - name: Update Portainer Stack
        run: curl -X POST ${{ secrets.PORTAINER_WEBHOOK_URL }}

      # Atomically replace the old cache directory with the new one so that
      # stale blobs from previous builds do not accumulate.
      - name: Move cache
        run: |
          rm -rf /var/tmp/.buildx-cache
          mv /var/tmp/.buildx-cache-new /var/tmp/.buildx-cache
